<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>工时报表</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0e1822;--surface:#162030;--surface2:#1c2a3e;
      --border:#253448;--navy:#1B2E4B;--orange:#E8943A;
      --brown:#8B5E3C;--cream:#F5ECD7;--text:#EEE8DC;--muted:#7A8FA6;
      --mono:'Space Mono',monospace;--sans:'Noto Sans SC',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);padding:14px;font-size:13px;}
    .label{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:5px;font-family:var(--mono);}
    .xin-strip{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
    .xin-dot{width:8px;height:8px;border-radius:50%;}
    .xin-name{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;}
    .xin-line{flex:1;height:1px;background:var(--border);}

    /* Tabs */
    .tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--surface);padding:3px;border-radius:8px;}
    .tab{flex:1;padding:7px;border:none;border-radius:6px;background:transparent;color:var(--muted);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .15s;}
    .tab.active{background:var(--orange);color:#fff;font-weight:700;}

    /* Filters */
    .filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
    .filter-group{display:flex;flex-direction:column;}
    select,input[type="date"]{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;width:100%;}
    select:focus,input[type="date"]:focus{border-color:var(--orange);}
    input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer;}

    .btn-query{width:100%;padding:9px;background:var(--orange);color:#fff;border:none;border-radius:8px;font-weight:700;font-family:var(--sans);font-size:13px;cursor:pointer;margin-bottom:12px;transition:all .15s;}
    .btn-query:hover{filter:brightness(1.1);}

    /* Summary */
    .summary-bar{display:flex;gap:8px;margin-bottom:12px;}
    .summary-card{flex:1;background:var(--navy);border-radius:8px;padding:10px;text-align:center;position:relative;overflow:hidden;}
    .summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--orange);}
    .summary-card.s2::before{background:var(--brown);}
    .summary-card.s3::before{background:#5a7fa0;}
    .summary-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--cream);line-height:1;}
    .summary-lbl{font-size:10px;color:var(--muted);margin-top:4px;}

    /* Results */
    .results-scroll{max-height:180px;overflow-y:auto;}
    .results-scroll::-webkit-scrollbar{width:3px;}
    .results-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    table{width:100%;border-collapse:collapse;}
    th{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);text-align:left;padding:0 8px 7px;border-bottom:1px solid var(--border);}
    td{padding:7px 8px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:var(--surface2);}
    .td-name{font-weight:700;color:var(--cream);}
    .td-sub{color:var(--muted);font-size:11px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .td-hours{font-family:var(--mono);font-weight:700;color:var(--orange);text-align:right;}
    .td-count{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;}
    .td-pay{font-family:var(--mono);font-weight:700;color:#7aadcc;text-align:right;}

    /* Settlement panel */
    .divider{border:none;border-top:1px solid var(--border);margin:12px 0;}
    .settle-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .settle-title{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);}
    .settle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
    .settle-input{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;width:100%;}
    .settle-input:focus{border-color:var(--orange);}
    .settle-card{background:var(--navy);border-radius:8px;padding:12px;margin-bottom:8px;border-left:3px solid var(--orange);}
    .settle-name{font-weight:700;font-size:13px;color:var(--cream);margin-bottom:4px;}
    .settle-detail{font-size:11px;color:var(--muted);font-family:var(--mono);}
    .settle-amount{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--orange);text-align:right;}
    .settle-row{display:flex;justify-content:space-between;align-items:center;}
    .currency-select{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;}

    /* Detail */
    .detail-item{display:flex;justify-content:space-between;align-items:center;padding:7px 8px;border-bottom:1px solid var(--border);}
    .detail-item:last-child{border-bottom:none;}
    .detail-item:hover{background:var(--surface2);}
    .detail-left{flex:1;}
    .detail-name{font-weight:700;font-size:12px;color:var(--cream);}
    .detail-project{font-size:10px;color:var(--muted);}
    .detail-time{font-size:10px;color:var(--muted);font-family:var(--mono);}
    .detail-dur{font-family:var(--mono);font-size:12px;color:var(--orange);font-weight:700;}
    .badge-manual{font-size:9px;background:rgba(90,127,160,.2);color:#7aadcc;padding:1px 5px;border-radius:3px;margin-left:4px;font-family:var(--mono);}
    .empty-state{text-align:center;color:var(--muted);padding:20px;font-size:12px;}
    .demo-banner{background:rgba(139,94,60,.15);border:1px solid var(--brown);border-radius:6px;padding:6px 12px;margin-bottom:10px;font-size:11px;color:var(--brown);text-align:center;}

    /* Settle scroll */
    .settle-scroll{max-height:160px;overflow-y:auto;}
    .settle-scroll::-webkit-scrollbar{width:3px;}
    .settle-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  </style>
</head>
<body>
  <div class="xin-strip">
    <div class="xin-dot" style="background:var(--orange)"></div>
    <div class="xin-dot" style="background:var(--navy);border:1px solid #2a4060"></div>
    <div class="xin-dot" style="background:var(--brown)"></div>
    <span class="xin-name">XIN Studio · 工时报表</span>
    <div class="xin-line"></div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-person"   onclick="switchTab('person')">按人员</button>
    <button class="tab"        id="tab-project"  onclick="switchTab('project')">按项目</button>
    <button class="tab"        id="tab-settle"   onclick="switchTab('settle')">💰 结算</button>
    <button class="tab"        id="tab-detail"   onclick="switchTab('detail')">明细</button>
  </div>

  <div class="filters">
    <div class="filter-group"><div class="label">开始日期</div><input type="date" id="dateFrom"></div>
    <div class="filter-group"><div class="label">结束日期</div><input type="date" id="dateTo"></div>
    <div class="filter-group"><div class="label">人员筛选</div><select id="filterPerson"><option value="">所有人</option></select></div>
    <div class="filter-group"><div class="label">项目筛选</div><select id="filterProject"><option value="">所有项目</option></select></div>
  </div>

  <button class="btn-query" onclick="query()">查询工时</button>

  <div class="summary-bar">
    <div class="summary-card">   <div class="summary-val" id="sumHours">--</div><div class="summary-lbl">总工时(h)</div></div>
    <div class="summary-card s2"><div class="summary-val" id="sumPeople">--</div><div class="summary-lbl">人员数</div></div>
    <div class="summary-card s3"><div class="summary-val" id="sumSessions">--</div><div class="summary-lbl">打卡次数</div></div>
  </div>

  <div id="resultsArea"><div class="empty-state">选择日期范围后点击查询</div></div>

<script>
  var STORAGE_KEY='timetracker_records_v2';
  var currentTab='person',currentResults=[],allRecords=[];
  var trelloInstance=null,standaloneMode=false;
  var COLORS=['#E8943A','#8B5E3C','#5a7fa0','#c4a35a','#7a8fa6','#3a6e8b','#a07050','#4a9e7a'];

  function isTrelloAvailable(){return typeof TrelloPowerUp!=='undefined';}
  function localGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):[];}catch(e){return[];}}
  function localSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

  async function loadRecords(){
    if(standaloneMode)return localGet(STORAGE_KEY);
    try{return(await trelloInstance.get('board','shared',STORAGE_KEY))||[];}catch(e){return[];}
  }

  async function init(){
    // Default: this month
    var now=new Date();
    var firstDay=new Date(now.getFullYear(),now.getMonth(),1);
    document.getElementById('dateFrom').value=firstDay.toISOString().slice(0,10);
    document.getElementById('dateTo').value=now.toISOString().slice(0,10);

    if(!isTrelloAvailable()){
      standaloneMode=true;
      var b=document.createElement('div');b.className='demo-banner';
      b.textContent='预览模式 — 显示本地示例数据';
      document.body.insertBefore(b,document.body.firstChild);
      if(localGet(STORAGE_KEY).length===0){
        var base=Date.now();
        localSet(STORAGE_KEY,[
          {id:'d1',cardId:'c1',cardName:'网站改版',userName:'小明',clockIn:base-172800000,clockOut:base-172800000+7200000},
          {id:'d2',cardId:'c1',cardName:'网站改版',userName:'小红',clockIn:base-172800000,clockOut:base-172800000+5400000},
          {id:'d3',cardId:'c2',cardName:'APP开发', userName:'小明',clockIn:base-86400000, clockOut:base-86400000+9000000},
          {id:'d4',cardId:'c2',cardName:'APP开发', userName:'小李',clockIn:base-86400000, clockOut:base-86400000+3600000},
          {id:'d5',cardId:'c1',cardName:'网站改版',userName:'小明',clockIn:base-3600000,  clockOut:base-1800000,manual:true},
          {id:'d6',cardId:'c3',cardName:'后端API', userName:'小李',clockIn:base-50000000, clockOut:base-50000000+14400000},
        ]);
      }
    } else {
      trelloInstance=TrelloPowerUp.iframe();
    }

    allRecords=(await loadRecords()).filter(function(r){return r.clockOut;});

    var people=Array.from(new Set(allRecords.map(function(r){return r.userName;}))).sort();
    var projects=Array.from(new Set(allRecords.map(function(r){return r.cardName;}))).sort();
    var ps=document.getElementById('filterPerson'),pr=document.getElementById('filterProject');
    people.forEach(function(p){var o=document.createElement('option');o.value=p;o.textContent=p;ps.appendChild(o);});
    projects.forEach(function(p){var o=document.createElement('option');o.value=p;o.textContent=p;pr.appendChild(o);});

    query();
  }

  function getFiltered(){
    var fv=document.getElementById('dateFrom').value,tv=document.getElementById('dateTo').value;
    var person=document.getElementById('filterPerson').value,project=document.getElementById('filterProject').value;
    if(!fv||!tv)return allRecords;
    var from=new Date(fv),to=new Date(tv);to.setHours(23,59,59,999);
    return allRecords.filter(function(r){
      var d=new Date(r.clockIn);
      if(d<from||d>to)return false;
      if(person&&r.userName!==person)return false;
      if(project&&r.cardName!==project)return false;
      return true;
    });
  }

  function query(){
    currentResults=getFiltered();
    var totalMs=currentResults.reduce(function(s,r){return s+(r.clockOut-r.clockIn);},0);
    document.getElementById('sumHours').textContent=(totalMs/3600000).toFixed(1);
    document.getElementById('sumPeople').textContent=new Set(currentResults.map(function(r){return r.userName;})).size;
    document.getElementById('sumSessions').textContent=currentResults.length;
    renderTab();
  }

  function switchTab(tab){
    currentTab=tab;
    ['person','project','settle','detail'].forEach(function(n){
      document.getElementById('tab-'+n).classList.toggle('active',n===tab);
    });
    renderTab();
  }

  function renderTab(){
    if(currentTab==='person') renderGroup(function(r){return r.userName;},'人员','参与项目',function(recs){return Array.from(new Set(recs.map(function(r){return r.cardName;}))).join(', ');});
    else if(currentTab==='project') renderGroup(function(r){return r.cardName;},'项目','参与人员',function(recs){return Array.from(new Set(recs.map(function(r){return r.userName;}))).join(', ');});
    else if(currentTab==='settle') renderSettle();
    else renderDetail();
  }

  function renderGroup(keyFn,col1,col2,subFn){
    if(!currentResults.length){document.getElementById('resultsArea').innerHTML='<div class="empty-state">该筛选条件下无数据</div>';return;}
    var grouped=groupBy(currentResults,keyFn);
    var rows=Object.entries(grouped).map(function(e){
      return{label:e[0],sub:subFn(e[1]),ms:e[1].reduce(function(s,r){return s+(r.clockOut-r.clockIn);},0),count:e[1].length};
    }).sort(function(a,b){return b.ms-a.ms;});

    var html='<div class="results-scroll"><table><thead><tr><th>'+col1+'</th><th>'+col2+'</th><th style="text-align:right">工时</th><th style="text-align:right">次数</th></tr></thead><tbody>';
    rows.forEach(function(r,i){
      html+='<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+COLORS[i%COLORS.length]+';margin-right:6px;vertical-align:middle"></span><span class="td-name">'+esc(r.label)+'</span></td>'
        +'<td class="td-sub" title="'+esc(r.sub)+'">'+esc(r.sub)+'</td>'
        +'<td class="td-hours">'+(r.ms/3600000).toFixed(1)+'h</td>'
        +'<td class="td-count">'+r.count+'</td></tr>';
    });
    document.getElementById('resultsArea').innerHTML=html+'</tbody></table></div>';
  }

  // ── 结算面板 ─────────────────────────────────────────────
  function renderSettle(){
    if(!currentResults.length){document.getElementById('resultsArea').innerHTML='<div class="empty-state">该筛选条件下无数据</div>';return;}

    var grouped=groupBy(currentResults,function(r){return r.userName;});
    var people=Object.entries(grouped).map(function(e){
      return{name:e[0],ms:e[1].reduce(function(s,r){return s+(r.clockOut-r.clockIn);},0)};
    }).sort(function(a,b){return b.ms-a.ms;});

    var rateInputs=people.map(function(p,i){
      return'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">'
        +'<div style="flex:1;font-weight:700;font-size:12px;color:var(--cream)">'+esc(p.name)+'</div>'
        +'<div style="color:var(--muted);font-family:var(--mono);font-size:11px">'+(p.ms/3600000).toFixed(1)+'h</div>'
        +'<input class="settle-input" style="width:90px;text-align:right" type="number" min="0" step="0.01" placeholder="时薪" id="rate_'+i+'" oninput="calcSettle()" value="">'
        +'</div>';
    }).join('');

    var html='<div>'
      +'<div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">'
      +'<div class="label" style="margin:0;flex:1">输入各人时薪自动计算</div>'
      +'<select class="currency-select" id="currencySelect" onchange="calcSettle()">'
      +'<option value="CNY">¥ 人民币</option>'
      +'<option value="USD">$ 美元</option>'
      +'<option value="HKD">HK$ 港币</option>'
      +'<option value="EUR">€ 欧元</option>'
      +'</select>'
      +'</div>'
      +rateInputs
      +'<hr class="divider">'
      +'<div class="settle-title" style="margin-bottom:8px">结算金额</div>'
      +'<div class="settle-scroll" id="settleResults">'
      +'<div class="empty-state" style="padding:12px">输入时薪后自动计算</div>'
      +'</div>'
      +'</div>';

    document.getElementById('resultsArea').innerHTML=html;
    window._settlePeople=people;
  }

  function calcSettle(){
    if(!window._settlePeople)return;
    var currency=document.getElementById('currencySelect').value;
    var symbols={CNY:'¥',USD:'$',HKD:'HK$',EUR:'€'};
    var sym=symbols[currency]||'¥';

    var results=window._settlePeople.map(function(p,i){
      var rateEl=document.getElementById('rate_'+i);
      var rate=rateEl?parseFloat(rateEl.value):0;
      var hours=p.ms/3600000;
      var pay=isNaN(rate)||rate<=0?null:hours*rate;
      return{name:p.name,hours:hours,pay:pay,sym:sym};
    }).filter(function(r){return r.pay!==null;});

    var container=document.getElementById('settleResults');
    if(!results.length){container.innerHTML='<div class="empty-state" style="padding:12px">输入时薪后自动计算</div>';return;}

    var totalPay=results.reduce(function(s,r){return s+r.pay;},0);
    container.innerHTML=results.map(function(r){
      return'<div class="settle-card"><div class="settle-row">'
        +'<div><div class="settle-name">'+esc(r.name)+'</div>'
        +'<div class="settle-detail">'+r.hours.toFixed(1)+'h × '+r.sym+(r.pay/r.hours).toFixed(0)+'/h</div></div>'
        +'<div class="settle-amount">'+r.sym+r.pay.toFixed(2)+'</div>'
        +'</div></div>';
    }).join('')
    +'<div style="text-align:right;font-family:var(--mono);font-size:13px;color:var(--cream);padding:8px 4px;border-top:1px solid var(--border);margin-top:4px">'
    +'合计 <span style="color:var(--orange);font-size:16px;font-weight:700">'+sym+totalPay.toFixed(2)+'</span></div>';
  }

  function renderDetail(){
    if(!currentResults.length){document.getElementById('resultsArea').innerHTML='<div class="empty-state">该筛选条件下无数据</div>';return;}
    var sorted=currentResults.slice().sort(function(a,b){return b.clockIn-a.clockIn;});
    document.getElementById('resultsArea').innerHTML='<div class="results-scroll">'+sorted.map(function(r){
      var tag=r.manual?'<span class="badge-manual">补卡</span>':'';
      return'<div class="detail-item"><div class="detail-left"><div class="detail-name">'+esc(r.userName)+tag+'</div><div class="detail-project">📋 '+esc(r.cardName)+'</div><div class="detail-time">'+fmtDate(r.clockIn)+'  '+fmtTime(r.clockIn)+' → '+fmtTime(r.clockOut)+'</div></div><div class="detail-dur">'+fmtDur(r.clockOut-r.clockIn)+'</div></div>';
    }).join('')+'</div>';
  }

  function groupBy(arr,fn){return arr.reduce(function(acc,item){var k=fn(item);if(!acc[k])acc[k]=[];acc[k].push(item);return acc;},{});}
  function fmtTime(ts){return new Date(ts).toTimeString().slice(0,5);}
  function fmtDate(ts){return new Date(ts).toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'});}
  function fmtDur(ms){var m=Math.floor(ms/60000),h=Math.floor(m/60);return h>0?h+'h'+(m%60)+'m':m+'m';}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  init();
</script>
</body>
</html>
