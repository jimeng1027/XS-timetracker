<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>XIN Time Tracker</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; background: #1B2E4B; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
    p { font-size: 14px; opacity: 0.7; }
  </style>
</head>
<body>
  <p>XIN Time Tracker ✓</p>
  <script>
    var STORAGE_KEY = 'timetracker_records_v2';

    TrelloPowerUp.initialize({

      // ── 卡片右侧按钮（直接显示，不用点 Power-Up）──
      'card-buttons': function(t) {
        return [{
          icon: 'https://cdn-icons-png.flaticon.com/512/833/833451.png',
          text: '工时打卡',
          callback: function(t) {
            return t.popup({
              title: '⏱ 工时打卡',
              url: './card-button.html',
              height: 500,
            });
          }
        }];
      },

      // ── 卡片徽章：打卡中 / 今日工时 ──
      'card-badges': function(t) {
        // 从 board shared storage 读取（与 card-button.html 一致）
        return t.get('board', 'shared', STORAGE_KEY).then(function(records) {
          records = records || [];
          var cardId = t.getContext().card;
          var cardRecords = records.filter(function(r) { return r.cardId === cardId; });

          // 是否有人正在打卡
          var active = cardRecords.find(function(r) { return !r.clockOut; });
          if (active) {
            return [{ text: '⏳ 打卡中', color: 'green' }];
          }

          // 计算总工时（所有时间，不只今日）
          var totalMs = cardRecords
            .filter(function(r) { return r.clockOut; })
            .reduce(function(sum, r) { return sum + (r.clockOut - r.clockIn); }, 0);

          if (totalMs > 0) {
            var totalMin = Math.floor(totalMs / 60000);
            var h = Math.floor(totalMin / 60);
            var m = totalMin % 60;
            var label = h > 0 ? h + 'h' + (m > 0 ? m + 'm' : '') : m + 'm';
            return [{ text: '⏱ ' + label, color: 'blue' }];
          }

          return [];
        }).catch(function() { return []; });
      },

      // ── 看板顶部按钮（工时报表）──
      'board-buttons': function(t) {
        return [{
          icon: 'https://cdn-icons-png.flaticon.com/512/833/833451.png',
          text: '工时报表',
          callback: function(t) {
            return t.popup({
              title: '📊 工时报表',
              url: './reports.html',
              height: 540,
            });
          }
        }];
      }

    });
  </script>
</body>
</html>
