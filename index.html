<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>XIN Time Tracker</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; background: #1B2E4B; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
    p { font-size: 14px; opacity: 0.7; }
  </style>
</head>
<body>
  <p>XIN Time Tracker ✓</p>
  <script>
    var STORAGE_KEY = 'timetracker_records_v2';
    var ICON = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgd2lkdGg9IjI0IiBoZWlnaHQ9IjI0Ij48Y2lyY2xlIGN4PSIxMiIgY3k9IjEyIiByPSIxMCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjRTg5NDNBIiBzdHJva2Utd2lkdGg9IjIiLz48bGluZSB4MT0iMTIiIHkxPSIxMiIgeDI9IjEyIiB5Mj0iNyIgc3Ryb2tlPSIjRTg5NDNBIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIvPjxsaW5lIHgxPSIxMiIgeTE9IjEyIiB4Mj0iMTYiIHkyPSIxMiIgc3Ryb2tlPSIjRTg5NDNBIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIvPjwvc3ZnPg==';

    TrelloPowerUp.initialize({

      'card-buttons': function(t) {
        return [{
          icon: ICON,
          text: '工时打卡',
          callback: function(t) {
            return t.popup({
              title: '⏱ 工时打卡',
              url: './card-button.html',
              height: 500,
            });
          }
        }];
      },

      // ── 卡片徽章：每人名字 + 工时 ──
      'card-badges': function(t) {
        return t.get('board', 'shared', STORAGE_KEY).then(function(records) {
          records = records || [];
          var cardId = t.getContext().card;
          var cardRecords = records.filter(function(r) { return r.cardId === cardId; });

          if (!cardRecords.length) return [];

          // 按人汇总工时
          var byPerson = {};
          cardRecords.forEach(function(r) {
            if (!byPerson[r.userName]) byPerson[r.userName] = { ms: 0, active: false };
            if (!r.clockOut) {
              byPerson[r.userName].active = true;
            } else {
              byPerson[r.userName].ms += (r.clockOut - r.clockIn);
            }
          });

          var badges = [];
          Object.keys(byPerson).forEach(function(name) {
            var p = byPerson[name];
            if (p.active) {
              badges.push({ text: '⏳ ' + name, color: 'yellow' });
            } else if (p.ms > 0) {
              var m = Math.floor(p.ms / 60000);
              var h = Math.floor(m / 60);
              var label = h > 0 ? h + 'h' + (m % 60 > 0 ? (m % 60) + 'm' : '') : m + 'm';
              badges.push({ text: name + ' ' + label, color: 'blue' });
            }
          });

          return badges;
        }).catch(function() { return []; });
      },

      // ── 看板顶部按钮（工时报表）──
      'board-buttons': function(t) {
        return [{
          icon: ICON,
          text: '工时报表',
          callback: function(t) {
            return t.popup({
              title: '📊 工时报表',
              url: './reports.html',
              height: 540,
            });
          }
        }];
      }

    });
  </script>
</body>
</html>
