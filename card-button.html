<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>打卡</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0e1822; --surface:#162030; --surface2:#1c2a3e;
      --border:#253448; --navy:#1B2E4B; --orange:#E8943A;
      --brown:#8B5E3C; --cream:#F5ECD7; --text:#EEE8DC; --muted:#7A8FA6;
      --mono:'Space Mono',monospace; --sans:'Noto Sans SC',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);padding:14px;font-size:13px;}
    .label{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:5px;font-family:var(--mono);}
    .row{display:flex;gap:8px;margin-bottom:10px;}
    .col{flex:1;display:flex;flex-direction:column;}
    input[type="text"],input[type="datetime-local"],select{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;width:100%;transition:border-color .2s;}
    input:focus,select:focus{border-color:var(--orange);}
    input[type="datetime-local"]::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer;}
    .clock-display{background:var(--navy);border:1px solid #2a4060;border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
    .clock-time{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--orange);}
    .clock-date{font-size:10px;color:var(--muted);font-family:var(--mono);text-align:right;line-height:1.6;}
    .session-pill{display:none;align-items:center;gap:5px;background:rgba(232,148,58,.15);border:1px solid var(--orange);border-radius:20px;padding:3px 10px;font-family:var(--mono);font-size:11px;color:var(--orange);animation:blink 2s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.55}}
    .mode-tabs{display:flex;gap:4px;margin-bottom:10px;background:var(--surface);padding:3px;border-radius:8px;}
    .mode-tab{flex:1;padding:6px;border:none;border-radius:6px;background:transparent;color:var(--muted);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .15s;}
    .mode-tab.active{background:var(--orange);color:#fff;font-weight:700;}
    .btn{width:100%;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:700;font-family:var(--sans);cursor:pointer;transition:all .15s;margin-bottom:7px;}
    .btn-clockin{background:var(--orange);color:#fff;}
    .btn-clockout{background:var(--brown);color:#fff;}
    .btn-save{background:var(--navy);color:var(--orange);border:1px solid var(--orange);}
    .btn:hover:not(:disabled){filter:brightness(1.12);transform:translateY(-1px);}
    .btn:disabled{opacity:.3;cursor:not-allowed;transform:none;}
    .btn-sm{padding:5px 10px;border:1px solid var(--border);border-radius:5px;font-size:11px;font-family:var(--sans);cursor:pointer;background:var(--surface2);color:var(--muted);transition:all .15s;}
    .btn-sm:hover,.btn-sm.active-f{border-color:var(--orange);color:var(--orange);}
    .status-msg{font-size:11px;text-align:center;color:var(--orange);height:16px;margin-bottom:6px;font-family:var(--mono);}
    .divider{border:none;border-top:1px solid var(--border);margin:10px 0;}
    .records-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .records-title{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-family:var(--mono);}
    .records-scroll{max-height:130px;overflow-y:auto;}
    .records-scroll::-webkit-scrollbar{width:3px;}
    .records-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .record-item{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border-radius:6px;padding:7px 10px;margin-bottom:4px;border-left:3px solid var(--brown);transition:background .15s;}
    .record-item:hover{background:var(--surface2);}
    .record-item.active{border-left-color:var(--orange);}
    .record-item.manual{border-left-color:#5a7fa0;}
    .record-main{flex:1;}
    .record-name{font-weight:700;font-size:12px;color:var(--cream);}
    .record-project{font-size:10px;color:var(--muted);}
    .record-time{font-family:var(--mono);font-size:10px;color:var(--muted);}
    .record-right{display:flex;align-items:center;gap:8px;}
    .record-duration{font-family:var(--mono);font-size:12px;color:var(--brown);font-weight:700;}
    .record-item.active .record-duration{color:var(--orange);}
    .record-item.manual .record-duration{color:#7aadcc;}
    .delete-btn{background:none;border:none;color:var(--border);cursor:pointer;font-size:13px;padding:0 2px;transition:color .15s;}
    .delete-btn:hover{color:var(--orange);}
    .badge{font-size:9px;padding:1px 5px;border-radius:3px;font-family:var(--mono);margin-left:5px;background:rgba(90,127,160,.2);color:#7aadcc;}
    .empty-state{text-align:center;color:var(--muted);font-size:11px;padding:14px;}
    .xin-strip{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
    .xin-dot{width:8px;height:8px;border-radius:50%;}
    .xin-name{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;}
    .xin-line{flex:1;height:1px;background:var(--border);}
    .demo-banner{background:rgba(139,94,60,.15);border:1px solid var(--brown);border-radius:6px;padding:6px 12px;margin-bottom:10px;font-size:11px;color:var(--brown);text-align:center;}

    /* Manual panel larger layout */
    #panelManual .manual-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:10px;}
    #panelManual .manual-grid .col{display:flex;flex-direction:column;}
    #panelManual input[type="datetime-local"]{font-size:13px;padding:10px;}
    .duration-preview{background:var(--navy);border-radius:6px;padding:8px 12px;text-align:center;margin-bottom:10px;font-family:var(--mono);color:var(--orange);font-size:16px;font-weight:700;}
    .duration-label{font-size:10px;color:var(--muted);margin-bottom:2px;}
  </style>
</head>
<body>
  <div class="xin-strip">
    <div class="xin-dot" style="background:var(--orange)"></div>
    <div class="xin-dot" style="background:var(--navy);border:1px solid #2a4060"></div>
    <div class="xin-dot" style="background:var(--brown)"></div>
    <span class="xin-name">XIN Studio · 工时打卡</span>
    <div class="xin-line"></div>
  </div>

  <div class="row">
    <div class="col">
      <div class="label">姓名</div>
      <input type="text" id="nameInput" placeholder="输入姓名..." maxlength="20">
    </div>
    <div class="col">
      <div class="label">项目</div>
      <input type="text" id="projectInput" placeholder="项目名称..." maxlength="30" list="projectSuggestions">
      <datalist id="projectSuggestions"></datalist>
    </div>
  </div>

  <div class="clock-display">
    <div>
      <div class="clock-time" id="clockTime">--:--:--</div>
      <div class="clock-date" id="clockDate">--</div>
    </div>
    <div class="session-pill" id="sessionPill">● <span id="sessionDuration">00:00:00</span></div>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-live"   onclick="switchMode('live')">⏱ 实时打卡</button>
    <button class="mode-tab"        id="tab-manual" onclick="switchMode('manual')">✏️ 手动补卡</button>
  </div>

  <!-- 实时打卡 -->
  <div id="panelLive">
    <div class="status-msg" id="statusMsg"></div>
    <button class="btn btn-clockin"  id="btnClockIn"  onclick="clockIn()">▶ 开始打卡</button>
    <button class="btn btn-clockout" id="btnClockOut" onclick="clockOut()" disabled>■ 结束打卡</button>
  </div>

  <!-- 手动补卡 -->
  <div id="panelManual" style="display:none">
    <div class="manual-grid">
      <div class="col">
        <div class="label">开始时间</div>
        <input type="datetime-local" id="manualStart" oninput="updatePreview()">
      </div>
      <div class="col">
        <div class="label">结束时间</div>
        <input type="datetime-local" id="manualEnd" oninput="updatePreview()">
      </div>
    </div>
    <div class="duration-preview">
      <div class="duration-label">时长预览</div>
      <div id="durationPreview">--</div>
    </div>
    <div class="status-msg" id="statusMsgManual"></div>
    <button class="btn btn-save" onclick="saveManual()">💾 保存补卡记录</button>
  </div>

  <hr class="divider">

  <div class="records-header">
    <div class="records-title">今日记录</div>
    <div style="display:flex;gap:5px">
      <button class="btn-sm active-f" id="fAll" onclick="filterToday('all')">全部</button>
      <button class="btn-sm"          id="fMe"  onclick="filterToday('me')">只看我</button>
    </div>
  </div>
  <div class="records-scroll" id="recordsList"><div class="empty-state">暂无记录</div></div>

<script>
  var STORAGE_KEY='timetracker_records_v2';
  var trelloInstance=null,standaloneMode=false;
  var cardId='standalone',cardName='';
  var clockInterval=null,sessionInterval=null;
  var activeSession=null,allRecords=[],currentMode='live',todayFilter='all';

  function isTrelloAvailable(){return typeof TrelloPowerUp!=='undefined';}
  function localGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):[];}catch(e){return[];}}
  function localSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

  async function loadRecords(){
    if(standaloneMode)return localGet(STORAGE_KEY);
    try{return(await trelloInstance.get('board','shared',STORAGE_KEY))||[];}catch(e){return[];}
  }
  async function saveRecords(){
    var cutoff=Date.now()-30*24*60*60*1000;
    allRecords=allRecords.filter(function(r){return r.clockIn>cutoff;});
    if(standaloneMode){localSet(STORAGE_KEY,allRecords);return;}
    try{await trelloInstance.set('board','shared',STORAGE_KEY,allRecords);}catch(e){}
  }

  async function init(){
    if(!isTrelloAvailable()){
      standaloneMode=true;
      var b=document.createElement('div');b.className='demo-banner';
      b.textContent='预览模式 — 使用浏览器本地存储';
      document.body.insertBefore(b,document.body.firstChild);
    } else {
      trelloInstance=TrelloPowerUp.iframe();
      var ctx=trelloInstance.getContext();cardId=ctx.card;
      var card=await trelloInstance.card('name');cardName=card.name;
      document.getElementById('projectInput').value=cardName;
    }
    allRecords=await loadRecords();
    refreshSuggestions();
    var saved=localStorage.getItem('tt_username')||'';
    document.getElementById('nameInput').value=saved;
    if(saved)checkActiveSession(saved);
    var now=new Date();
    document.getElementById('manualEnd').value=toLocal(now);
    document.getElementById('manualStart').value=toLocal(new Date(now-7200000));
    updatePreview();
    startClock();renderTodayRecords();
  }

  function updatePreview(){
    var sv=document.getElementById('manualStart').value;
    var ev=document.getElementById('manualEnd').value;
    if(!sv||!ev){document.getElementById('durationPreview').textContent='--';return;}
    var ms=new Date(ev)-new Date(sv);
    if(ms<=0){document.getElementById('durationPreview').textContent='⚠️ 时间有误';return;}
    document.getElementById('durationPreview').textContent=fdFull(ms);
  }

  function refreshSuggestions(){
    var dl=document.getElementById('projectSuggestions');
    var ps=Array.from(new Set(allRecords.map(function(r){return r.cardName;}))).sort();
    dl.innerHTML=ps.map(function(p){return'<option value="'+esc(p)+'">';}).join('');
  }

  function checkActiveSession(name){
    var a=allRecords.find(function(r){return r.userName===name&&!r.clockOut;});
    if(a){activeSession=a;document.getElementById('btnClockIn').disabled=true;document.getElementById('btnClockOut').disabled=false;document.getElementById('sessionPill').style.display='flex';startSessionTimer();setStatus('🟠 '+name+' 打卡中...');}
  }

  function switchMode(m){
    currentMode=m;
    document.getElementById('tab-live').classList.toggle('active',m==='live');
    document.getElementById('tab-manual').classList.toggle('active',m==='manual');
    document.getElementById('panelLive').style.display=m==='live'?'block':'none';
    document.getElementById('panelManual').style.display=m==='manual'?'block':'none';
  }

  async function clockIn(){
    var name=document.getElementById('nameInput').value.trim();
    var proj=document.getElementById('projectInput').value.trim();
    if(!name){setStatus('请先输入姓名！');return;}
    if(!proj){setStatus('请输入项目名！');return;}
    if(allRecords.find(function(r){return r.userName===name&&!r.clockOut;})){setStatus('你已经在打卡中，请先结束');return;}
    localStorage.setItem('tt_username',name);
    var s={id:Date.now()+'_'+Math.random().toString(36).substr(2,5),cardId:cardId,cardName:proj,userName:name,clockIn:Date.now(),clockOut:null,manual:false};
    allRecords.push(s);activeSession=s;
    await saveRecords();refreshSuggestions();
    document.getElementById('btnClockIn').disabled=true;document.getElementById('btnClockOut').disabled=false;
    document.getElementById('sessionPill').style.display='flex';
    startSessionTimer();setStatus('✓ 打卡开始');renderTodayRecords();
  }

  async function clockOut(){
    if(!activeSession)return;
    activeSession.clockOut=Date.now();await saveRecords();
    clearInterval(sessionInterval);activeSession=null;
    document.getElementById('btnClockIn').disabled=false;document.getElementById('btnClockOut').disabled=true;
    document.getElementById('sessionPill').style.display='none';
    setStatus('✓ 打卡结束');renderTodayRecords();
  }

  async function saveManual(){
    var name=document.getElementById('nameInput').value.trim();
    var proj=document.getElementById('projectInput').value.trim();
    var sv=document.getElementById('manualStart').value;
    var ev=document.getElementById('manualEnd').value;
    if(!name){setStatusM('请先输入姓名！');return;}
    if(!proj){setStatusM('请输入项目名！');return;}
    if(!sv||!ev){setStatusM('请填写开始和结束时间');return;}
    var st=new Date(sv).getTime(),et=new Date(ev).getTime();
    if(et<=st){setStatusM('结束时间必须晚于开始时间');return;}
    if(et>Date.now()){setStatusM('结束时间不能是未来');return;}
    localStorage.setItem('tt_username',name);
    allRecords.push({id:'m_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),cardId:cardId,cardName:proj,userName:name,clockIn:st,clockOut:et,manual:true});
    await saveRecords();refreshSuggestions();
    setStatusM('✓ 补卡已保存');renderTodayRecords();
    var now=new Date();document.getElementById('manualEnd').value=toLocal(now);document.getElementById('manualStart').value=toLocal(new Date(now-3600000));
    updatePreview();
  }

  function filterToday(f){
    todayFilter=f;
    document.getElementById('fAll').classList.toggle('active-f',f==='all');
    document.getElementById('fMe').classList.toggle('active-f',f==='me');
    renderTodayRecords();
  }

  async function deleteRecord(id){
    if(!confirm('删除这条记录？'))return;
    allRecords=allRecords.filter(function(r){return r.id!==id;});
    if(activeSession&&activeSession.id===id){clearInterval(sessionInterval);activeSession=null;document.getElementById('btnClockIn').disabled=false;document.getElementById('btnClockOut').disabled=true;document.getElementById('sessionPill').style.display='none';}
    await saveRecords();renderTodayRecords();
  }

  function renderTodayRecords(){
    var me=document.getElementById('nameInput').value.trim();
    var today=new Date().toDateString();
    var recs=allRecords.filter(function(r){
      if(new Date(r.clockIn).toDateString()!==today)return false;
      if(todayFilter==='me'&&r.userName!==me)return false;
      return true;
    }).sort(function(a,b){return b.clockIn-a.clockIn;});
    var c=document.getElementById('recordsList');
    if(!recs.length){c.innerHTML='<div class="empty-state">今日暂无记录</div>';return;}
    c.innerHTML=recs.map(function(r){
      var inT=ft(r.clockIn),outT=r.clockOut?ft(r.clockOut):'进行中';
      var dur=r.clockOut?fd(r.clockOut-r.clockIn):'⏳';
      var cls=!r.clockOut?'active':(r.manual?'manual':'');
      var tag=r.manual?'<span class="badge">补卡</span>':'';
      return'<div class="record-item '+cls+'"><div class="record-main"><div class="record-name">'+esc(r.userName)+tag+'</div><div class="record-project">📋 '+esc(r.cardName)+'</div><div class="record-time">'+inT+' → '+outT+'</div></div><div class="record-right"><div class="record-duration">'+dur+'</div><button class="delete-btn" onclick="deleteRecord(\''+r.id+'\')">✕</button></div></div>';
    }).join('');
  }

  function startClock(){
    function tick(){var n=new Date();document.getElementById('clockTime').textContent=n.toTimeString().slice(0,8);document.getElementById('clockDate').textContent=n.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});}
    tick();clockInterval=setInterval(tick,1000);
  }
  function startSessionTimer(){
    function tick(){if(!activeSession)return;document.getElementById('sessionDuration').textContent=fdFull(Date.now()-activeSession.clockIn);}
    tick();sessionInterval=setInterval(tick,1000);
  }

  function ft(ts){return new Date(ts).toTimeString().slice(0,5);}
  function fd(ms){var m=Math.floor(ms/60000),h=Math.floor(m/60);return h>0?h+'h'+(m%60>0?(m%60)+'m':''):m+'m';}
  function fdFull(ms){var s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return pad(h)+':'+pad(m)+':'+pad(sc);}
  function pad(n){return String(n).padStart(2,'0');}
  function toLocal(d){var o=d.getTimezoneOffset()*60000;return new Date(d-o).toISOString().slice(0,16);}
  function setStatus(msg){var el=document.getElementById('statusMsg');el.textContent=msg;setTimeout(function(){if(el.textContent===msg)el.textContent='';},3000);}
  function setStatusM(msg){var el=document.getElementById('statusMsgManual');el.textContent=msg;setTimeout(function(){if(el.textContent===msg)el.textContent='';},3000);}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  init();
</script>
</body>
</html>
